bundle:
  name: agent-bricks-chatbot

variables:
  serving_endpoint_name:
    description: "Name of the MAS serving endpoint (auto-discovered by deploy script)"
    default: "databricks-chatbot-endpoint"
  database_instance_name:
    description: "Base name of the Lakebase database instance"
    default: "agent-bricks-lakebase"
  resource_name_suffix:
    description: "Suffix for resource names to avoid collisions"
    default: "workshop"
  app_name:
    description: "Name of the Databricks App"
    default: "agent-bricks-chatbot"
  # ── Pro mode (OPTIONAL) ──────────────────────────────────────────────────
  # Name of the SQL warehouse the app reads graph/ticker tables from. Only used
  # when the PRO MODE warehouse resource below is uncommented (pro deploys).
  warehouse_name:
    description: "Name of the SQL warehouse used by the pro-mode Graph/Data tabs"
    default: ""

resources:
  database_instances:
    chatbot_lakebase:
      name: ${var.database_instance_name}-${var.resource_name_suffix}
      capacity: CU_1

  apps:
    databricks_chatbot:
      name: ${var.app_name}-${var.resource_name_suffix}
      description: "Mag7 Financial Analysis Chatbot powered by Agent Bricks Multi-Agent Supervisor"
      source_code_path: .
      resources:
        - name: serving-endpoint
          description: "Multi-Agent Supervisor serving endpoint"
          serving_endpoint:
            name: ${var.serving_endpoint_name}
            permission: CAN_QUERY
        - name: database
          description: "Lakebase database instance for persistent chat history"
          database:
            database_name: databricks_postgres
            instance_name: ${resources.database_instances.chatbot_lakebase.name}
            permission: CAN_CONNECT_AND_CREATE
        # PRO MODE WAREHOUSE: uncomment to grant the app CAN_USE on the SQL
        # warehouse that backs the Graph + Data Explorer tabs. The pro deploy
        # notebook (06b) sets var.warehouse_name and uncomments this for you.
        # - name: sql-warehouse
        #   description: "SQL warehouse for pro-mode graph/ticker queries"
        #   sql_warehouse:
        #     name: ${var.warehouse_name}
        #     permission: CAN_USE

targets:
  dev:
    mode: development
    default: true
    variables:
      resource_name_suffix: dev-${workspace.current_user.domain_friendly_name}
    presets:
      source_linked_deployment: false

  staging:
    mode: production
    variables:
      resource_name_suffix: "staging"
    presets:
      source_linked_deployment: false

  prod:
    mode: production
    variables:
      resource_name_suffix: "prod"
    presets:
      source_linked_deployment: false
